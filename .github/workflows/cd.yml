name: CD

# Path-aware continuous deployment for the monorepo.
#   - changes under app/**   -> build, test, deploy to App Service
#   - changes under infra/** -> terraform plan, then apply (manual approval)
#   - both changed           -> app deploys FIRST; infra apply waits on it
#
# One workflow (not two) so ordering is guaranteed: terraform-apply `needs`
# deploy-app, which is impossible to enforce across separately-triggered
# workflows. CI (fast checks on every push/PR) stays in ci.yml.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_app:
        description: "Force the app deploy (manual runs)"
        type: boolean
        default: true
      force_infra:
        description: "Force the terraform plan + apply (manual runs)"
        type: boolean
        default: false

# Serialise with rollback.yml (same group) so deploys never race each other.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # OIDC for azure/login and the azurerm provider/backend
  contents: read

env:
  NODE_VERSION: "20"
  TF_VERSION: "1.15.8"

jobs:
  # ---- Detect which part of the monorepo changed ---------------------------
  detect:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app == 'true' || inputs.force_app == true }}
      infra: ${{ steps.filter.outputs.infra == 'true' || inputs.force_infra == true }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so paths-filter can diff HEAD against the push base
          # (github.event.before); a shallow clone can't find it and would
          # conservatively mark every path changed.
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
            infra:
              - 'infra/**'

  # ---- App CD (runs first when both changed) -------------------------------
  deploy-app:
    name: App · build & deploy
    needs: detect
    if: needs.detect.outputs.app == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install & test
        working-directory: app
        run: |
          npm ci
          npm test

      - name: Prepare deployment package
        working-directory: app
        # Ship source only; App Service (Oryx) runs the production install on deploy
        # because SCM_DO_BUILD_DURING_DEPLOYMENT=true (set by Terraform).
        run: rm -rf node_modules

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stamp deployed commit SHA
        env:
          SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          APP: ${{ vars.AZURE_WEBAPP_NAME }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # The runner's Azure CLI requests an unsupported Microsoft.Web
          # api-version for `az webapp config appsettings set`, so go straight
          # to ARM with a pinned, supported version: read the current settings,
          # merge APP_COMMIT_SHA, write the full set back.
          BASE="https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Web/sites/$APP/config/appsettings"
          API="2024-11-01"
          az rest --method POST --url "$BASE/list?api-version=$API" --query properties -o json > cur.json
          jq -n --slurpfile p cur.json --arg sha "$SHA" \
            '{properties: ($p[0] + {APP_COMMIT_SHA: $sha})}' > put.json
          az rest --method PUT --url "$BASE?api-version=$API" \
            --headers Content-Type=application/json --body @put.json --output none

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: app

      - name: Smoke test /healthz
        run: |
          URL="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz"
          echo "Probing $URL"
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            if [ "$code" = "200" ]; then echo "healthy"; exit 0; fi
            echo "attempt $i: HTTP $code — retrying in 15s"; sleep 15
          done
          echo "health check failed"; exit 1

  # ---- Infra CD · plan (read-only, runs in parallel with the app) ----------
  terraform-plan:
    name: Infra · terraform plan
    needs: detect
    if: needs.detect.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/environments/prod
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true" # AAD auth for the state backend (no storage keys)
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
      # No SQL password: the app authenticates to Azure SQL via managed identity.
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config=backend.config -input=false

      - name: Terraform plan
        run: terraform plan -input=false -lock-timeout=120s -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v5
        with:
          name: tfplan-${{ github.sha }}
          path: infra/environments/prod/tfplan
          retention-days: 5

  # ---- Infra CD · apply (gated: needs approval + app deployed first) -------
  terraform-apply:
    name: Infra · terraform apply
    needs: [detect, deploy-app, terraform-plan]
    # Run when infra changed and the plan succeeded, regardless of whether the
    # app deploy ran (skipped) — but NOT if the app deploy failed (app first).
    if: >-
      !cancelled()
      && needs.detect.outputs.infra == 'true'
      && needs.terraform-plan.result == 'success'
      && (needs.deploy-app.result == 'success' || needs.deploy-app.result == 'skipped')
    runs-on: ubuntu-latest
    # Approval gate: configure required reviewers on this environment in GitHub.
    environment: production-infra
    defaults:
      run:
        working-directory: infra/environments/prod
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config=backend.config -input=false

      - name: Download plan
        uses: actions/download-artifact@v5
        with:
          name: tfplan-${{ github.sha }}
          path: infra/environments/prod

      - name: Terraform apply
        run: terraform apply -input=false -lock-timeout=120s tfplan
